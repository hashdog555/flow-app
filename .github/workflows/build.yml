name: Build & Release Toonflow-app

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，方便生成版本号

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vue frontend
        run: npm run build

      - name: Build Electron app
        run: |
          npm run make || npm run dist || npm run electron:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: |
            dist/
            out/

      # 新增：自动生成版本号和Tag
      - name: Generate version tag
        id: version
        run: |
          echo "VERSION=v1.0.${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git tag v1.0.${GITHUB_RUN_ID}
          git push origin v1.0.${GITHUB_RUN_ID}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/master'
        with:
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.VERSION }} # 使用上面生成的Tag
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}