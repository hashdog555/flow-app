name: Build & Release Toonflow-app

on:
  push:
    branches: [ master ] # 你的默认分支是 master，这里对应上
  pull_request:
    branches: [ master ]
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 适配项目的 Node 版本
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue frontend
        run: npm run build

      - name: Build Electron app
        run: npm run electron:build # 原项目一般都配置了这个脚本

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: dist/ # 打包产物的目录

      - name: Create Release (only on master push)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
